<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css"></link>
    <title>FD Calculator</title>
</head>
<body>
    
    <div class="container">
        <h1>FD Calculator</h1>
        <div class="form-group">
            <label for="main">Main Amount</label>
            <input type="number" id="main" placeholder="Enter the main amount">
        </div>
        <div class="form-group">
            <label for="interest">Interest Rate</label>
            <input type="number" id="interest" placeholder="Enter the Interest Rate">
        </div>
        <div class="form-group">
            <label for="tenure">Tenure (in years)</label>
            <input type="number" id="tenure" placeholder="Enter tenure in years">
        </div>

        <button id="calbtn" class="calculatebtn">Calculate</button>
        <p id="result" class="showresult">Matuarity Amount : </p>


    </div>
    
    <script src="script.js"></script>
</body>
</html>
